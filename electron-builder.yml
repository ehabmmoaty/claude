appId: ae.gov.dge.anees-desktop
productName: Anees Desktop
copyright: Copyright © 2026 Department of Government Enablement
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - assets/**/*
  - "!node_modules/**/*.{md,map,ts}"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish:
  provider: generic
  url: https://updates.anees.gov.ae
